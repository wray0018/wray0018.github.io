<!DOCTYPE html>
<html>
<head>
  <title>CIT and Business Majors</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/handlebars.js/4.1.2/handlebars.min.js"></script>
</head>
<body>
  <h1> Select a Major</h1>
  <h1>Select a Major</h1>
  <button onclick="filterMajors('CIT')">CIT Majors</button>
  <button onclick="filterMajors('BUS')">Business Majors</button>
  <div id="result"></div>
  <h6> We filter our dataset by Major</h6>
  <h6>We filter our dataset by Major</h6>

  <!-- Handlebars Template -->
  <script id="template" type="text/x-handlebars-template">
    <table>
      <tr><th>Name</th><th>Major</th><th>Midterm</th><th>Final</th></tr>
      {{#each students}}
        <tr>
          <td>{{name}}</td>
          <td>{{major}}</td>
          <td>{{midterm}}</td>
          <td>{{final}}</td>
        </tr>
      {{/each}}
    </table>
  </script>

  <script src="app.js"></script>
</body>
</html>
